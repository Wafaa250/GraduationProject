<!doctype html>
<html lang="en">
  <head>
    <script>
      (function () {
        var key = "skillswap-theme";
        var stored = localStorage.getItem(key);
        var dark =
          stored === "dark" ||
          (stored !== "light" &&
            window.matchMedia("(prefers-color-scheme: dark)").matches);
        if (dark) document.documentElement.classList.add("dark");
        else document.documentElement.classList.remove("dark");
        document.documentElement.style.colorScheme = dark ? "dark" : "light";

        var role = localStorage.getItem("role");
        if (role) {
          var r = role.toLowerCase().replace(/[\s_-]/g, "");
          var roleClass = null;
          if (r === "student") roleClass = "role-student";
          else if (r === "doctor") roleClass = "role-doctor";
          else if (r === "company") roleClass = "role-company";
          else if (r === "studentassociation" || r === "association") roleClass = "role-association";
          if (roleClass) document.documentElement.classList.add(roleClass);
        }
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SkillSwap — Build Better Teams Through Skills and AI</title>
    <meta
      name="description"
      content="SkillSwap is an AI-powered platform that matches students, supervisors, companies, and organizations based on skills and project needs."
    />
    <meta property="og:title" content="SkillSwap — Build Better Teams Through Skills and AI" />
    <meta
      property="og:description"
      content="An intelligent platform that matches students, supervisors, companies, and organizations."
    />
    <meta property="og:type" content="website" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
